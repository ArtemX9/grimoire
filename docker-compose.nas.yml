version: '3.9'

# Deployment compose for UGREEN DXP4800+ (or any home NAS/server)
# Usage: docker compose -f docker-compose.nas.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      STEAM_API_KEY: ${STEAM_API_KEY:-}
      PSN_NPSSO: ${PSN_NPSSO:-}
      XBOX_CLIENT_ID: ${XBOX_CLIENT_ID:-}
      XBOX_CLIENT_SECRET: ${XBOX_CLIENT_SECRET:-}
      XBOX_REDIRECT_URI: ${XBOX_REDIRECT_URI:-}
      XBOX_FRONTEND_REDIRECT_URI: ${XBOX_FRONTEND_REDIRECT_URI:-}
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-grok}
      GROK_API_KEY: ${GROK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.6}
      LLM_NUM_CTX: ${LLM_NUM_CTX:-65536}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '${APP_PORT:-8080}:80'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
