<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Book body — warm near-black -->
  <rect x="4" y="3" width="24" height="27" rx="2" fill="#0d0c0b"/>
  <!-- Spine — slightly lighter warm dark -->
  <rect x="4" y="3" width="3.5" height="27" rx="1.5" fill="#1c1916"/>
  <!-- Spine highlight line -->
  <rect x="7" y="3" width="0.5" height="27" fill="#2a2520"/>
  <!-- Page edge detail -->
  <rect x="26" y="5" width="1.2" height="23" rx="0.6" fill="#1c1916"/>
  <rect x="24.8" y="5" width="0.6" height="23" rx="0.3" fill="#141210"/>
  <!-- Diamond clasp — gold stroke -->
  <path d="M16 9.5 L20.5 16 L16 22.5 L11.5 16 Z" stroke="#b8922a" stroke-width="1.4" fill="#0d0c0b" stroke-linejoin="round"/>
  <!-- Inner diamond — gold fill -->
  <path d="M16 12.5 L18.8 16 L16 19.5 L13.2 16 Z" fill="#b8922a"/>
  <!-- Cardinal dots — gold -->
  <circle cx="16" cy="9.5"  r="1.1" fill="#b8922a"/>
  <circle cx="20.5" cy="16" r="1.1" fill="#b8922a"/>
  <circle cx="16" cy="22.5" r="1.1" fill="#b8922a"/>
  <circle cx="11.5" cy="16" r="1.1" fill="#b8922a"/>
</svg>
