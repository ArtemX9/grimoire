name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  test-api:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter shared build

      - name: Generate Prisma client
        run: pnpm --filter api prisma generate
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/db

      - name: Run API tests
        run: pnpm --filter api test

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: tests
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/tests
      REDIS_URL: redis://localhost:6379
      BETTER_AUTH_SECRET: e2e-secret
      STEAM_API_KEY: stub
      TWITCH_CLIENT_ID: stub
      TWITCH_CLIENT_SECRET: stub
      GROK_API_KEY: stub
      LLM_PROVIDER: grok

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('apps/web/package.json') }}

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install chromium --with-deps

      - name: Build shared package
        run: pnpm --filter shared build

      - name: Migrate and seed database
        run: pnpm --filter api e2e:setup

      - name: Start API
        run: pnpm --filter api dev &

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 20); do
            nc -z localhost 3000 && echo "API is up" && break
            echo "Waiting for API... ($i/20)"
            sleep 3
          done

      - name: Build and serve frontend
        run: |
          pnpm --filter web build
          pnpm --filter web preview --port 5173 &

      - name: Run e2e tests
        run: pnpm --filter web e2e
        env:
          E2E_BASE_URL: http://localhost:5173

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  test-web:
    name: Web tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter shared build

      - name: Run web tests
        run: pnpm --filter web test:run
